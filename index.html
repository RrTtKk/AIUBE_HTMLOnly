<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>AIUBE JS Run</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #111;
      font-family: sans-serif;
    }

    #gameCanvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #1b1b1b;
    }

    #webcamPreview {
      position: fixed;
      top: max(20px, env(safe-area-inset-top));
      left: 20px;
      transform: scaleX(-1);
      width: 24vw;
      max-width: 130px;
      border: 2px solid white;
      border-radius: 8px;
      z-index: 10;
      background: black;
    }

    #debugText {
      position: fixed;
      top: 180px;
      left: 20px;
      right: 20px;
      color: white;
      background: rgba(0,0,0,0.75);
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-line;
      z-index: 10;
      display: none;
    }

    #experimentPanel {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: max(12px, env(safe-area-inset-bottom));
      z-index: 30;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      background: rgba(0,0,0,0.55);
      padding: 8px;
      border-radius: 10px;
    }

    #experimentPanel input,
    #experimentPanel button {
      font-size: 12px;
      padding: 8px 6px;
      border-radius: 6px;
      border: 1px solid #ffffff;
      min-height: 36px;
    }

    #experimentPanel input {
      width: auto;
      min-width: 0;
    }

    #experimentPanel button {
      background: #222;
      color: white;
      font-weight: bold;
    }

    #experimentStatus {
      position: fixed;
      left: 12px;
      bottom: calc(max(12px, env(safe-area-inset-bottom)) + 104px);
      z-index: 30;
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 12px;
      white-space: pre-line;
    }

    #conditionGuide {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      right: 12px;
      z-index: 25;
      color: white;
      background: rgba(0,0,0,0.65);
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.4;
      text-align: right;
      pointer-events: none;
    }

    #orientationOverlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      background: rgba(0,0,0,0.88);
      font-size: 22px;
      font-weight: bold;
      line-height: 1.6;
      padding: 24px;
    }

    @media (orientation: landscape) {
      #orientationOverlay {
        display: flex;
      }
    }

  </style>
</head>

<body>
  <canvas id="gameCanvas"></canvas>
  <video id="webcamPreview" autoplay muted playsinline></video>
  <div id="debugText"></div>
  <div id="conditionGuide">縦画面固定<br>端末は手持ち<br>顔から約50cm</div>
  <div id="orientationOverlay">端末を縦向きにしてください<br>実験条件：手持ち・顔から約50cm</div>

  <!-- 実験ログ操作パネル -->
  <div id="experimentStatus">記録停止中</div>
  <div id="experimentPanel">
    <input id="participantInput" value="P01" aria-label="participant">
    <button onclick="startExperiment('A')">A開始</button>
    <button onclick="startExperiment('I')">I開始</button>
    <button onclick="startExperiment('U')">U開始</button>
    <button onclick="startExperiment('BE')">BE開始</button>
    <button onclick="stopExperiment()">停止</button>
    <button onclick="sendExperimentToSheet()">送信</button>
    <button onclick="clearExperimentRows()">消去</button>
  </div>


  <script type="module">
    import {
      FaceLandmarker,
      FilesetResolver
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs";

    // ==================================================
    // Canvas
    // ==================================================
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    // ==================================================
    // MediaPipe
    // ==================================================
    let faceLandmarker;
    const video = document.getElementById("webcamPreview");
    const debugText = document.getElementById("debugText");
    const experimentStatus = document.getElementById("experimentStatus");
    const participantInput = document.getElementById("participantInput");
    let lastVideoTime = -1;

    let jaw = 0;
    let smile = 0;
    let pucker = 0;

    async function initMediaPipe() {
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
      );

      faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task"
        },
        runningMode: "VIDEO",
        numFaces: 1,
        outputFaceBlendshapes: true
      });

      console.log("[MediaPipe] OK");
    }

    async function initCamera() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        throw new Error("getUserMedia is not available. Use HTTPS on mobile browsers.");
      }

      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user" },
        audio: false
      });

      video.srcObject = stream;

      video.onloadeddata = () => {
        console.log("[Camera] OK");
        requestAnimationFrame(mainLoop);
      };
    }

    function updateMouthValues() {
      if (!faceLandmarker || video.readyState < 2) return;

      if (video.currentTime === lastVideoTime) return;
      lastVideoTime = video.currentTime;

      const result = faceLandmarker.detectForVideo(video, performance.now());

      if (!result.faceBlendshapes || result.faceBlendshapes.length === 0) {
        jaw = 0;
        smile = 0;
        pucker = 0;
        return;
      }

      const list = result.faceBlendshapes[0].categories;

      let smileL = 0;
      let smileR = 0;

      jaw = 0;
      pucker = 0;

      for (const b of list) {
        if (b.categoryName === "jawOpen") jaw = b.score;
        if (b.categoryName === "mouthSmileLeft") smileL = b.score;
        if (b.categoryName === "mouthSmileRight") smileR = b.score;
        if (b.categoryName === "mouthPucker") pucker = b.score;
      }

      smile = Math.max(smileL, smileR);
    }

    // ==================================================
    // Game Settings
    // ==================================================
    const settings = {
      totalSets: 40,
      spawnInterval: 2.0,
      startDelay: 5.0,

      blockMode: "BlockTwoLanes",
      // "BlockTwoLanes" or "BlockThreeLanes"

      lanePattern: [0, 1, 2, 3],

      beJawThreshold: 0.30,
      beSmileThreshold: 0.50,
      bePuckerBlockThreshold: 0.20,
      beHoldTime: 0.18,

      mouthDeadZone: 0.12,

      playerMoveSpeed: 12,
      obstacleSpeed: 280,

      coinCountPerSet: 3
    };


    // ==================================================
    // Experiment Logging / Google Sheets
    // ==================================================
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyVxkETGBnOpcvK5bhJWLahEkmdsgrh8cRDfWPTnzMKh5CdT7e8RVV2DY0RLyUfMhOO/exec";

    const experiment = {
      participantId: "P01",
      targetMouth: "A",
      isRecording: false,
      startTime: 0,
      lastRecordTime: 0,
      recordInterval: 0.100, // 10Hz：実験ログ用。縦画面スマホでの負荷とデータ量を抑える
      rows: []
    };

    const laneColors = [
      "#0072B2", // A
      "#D55E00", // I
      "#F0E442", // U
      "#8A5FD3"  // BE
    ];

    const laneLabels = ["A", "I", "U", "BE"];

    // ==================================================
    // Game State
    // ==================================================
    let gameState = "playing";

    let playerLane = 0;
    let playerX = 0;
    let targetPlayerX = 0;
    let currentMouthState = "";

    let beTimer = 0;

    let elapsed = 0;
    let spawnTimer = -settings.startDelay;
    let spawnedCount = 0;
    let judgedCount = 0;

    let successCount = 0;
    let hitCount = 0;
    let coinCount = 0;

    let lanePatternIndex = 0;

    const obstacleSets = [];
    const coins = [];

    let lastTime = performance.now();

    // ==================================================
    // Utility
    // ==================================================
    function isPortrait() {
      return canvas.height >= canvas.width;
    }

    function getLaneX(index) {
      const w = canvas.width;

      // 縦画面・手持ち前提：左右端に少し余白を残し、4レーンを均等配置
      const margin = isPortrait() ? w * 0.10 : w * 0.12;
      const usable = w - margin * 2;
      const gap = usable / 3;

      return margin + gap * index;
    }

    function getSafeLane() {
      const lane = settings.lanePattern[lanePatternIndex];
      lanePatternIndex++;

      if (lanePatternIndex >= settings.lanePattern.length) {
        lanePatternIndex = 0;
      }

      return Math.max(0, Math.min(3, lane));
    }

    function setPlayerLane(lane, state) {
      playerLane = lane;
      targetPlayerX = getLaneX(lane);
      currentMouthState = state;
    }

    function getPlayerY() {
      // 縦画面では実験ボタンと重ならないよう少し上に配置
      return canvas.height * (isPortrait() ? 0.72 : 0.82);
    }


    function updateExperimentStatus(message = null) {
      if (!experimentStatus) return;

      const state = experiment.isRecording ? "記録中" : "記録停止中";
      const line1 = `${state} / Target: ${experiment.targetMouth} / Rows: ${experiment.rows.length}`;
      experimentStatus.innerText = message ? `${line1}\n${message}` : line1;
    }

    function startExperiment(targetMouth) {
      experiment.participantId = participantInput.value.trim() || "P01";
      experiment.targetMouth = targetMouth;
      experiment.isRecording = true;
      experiment.startTime = performance.now();
      experiment.lastRecordTime = 0;
      experiment.rows = [];

      updateExperimentStatus(`${targetMouth} の記録を開始`);
      console.log("[Experiment Start]", experiment.participantId, targetMouth);
    }

    function stopExperiment() {
      experiment.isRecording = false;
      updateExperimentStatus("記録を停止");
      console.log("[Experiment Stop]", experiment.rows.length);
    }

    function clearExperimentRows() {
      if (experiment.isRecording) {
        alert("記録中は消去できません。先に停止してください。");
        return;
      }

      experiment.rows = [];
      updateExperimentStatus("記録データを消去");
    }

    function recordExperimentRow() {
      if (!experiment.isRecording) return;

      const t = (performance.now() - experiment.startTime) / 1000;

      if (t - experiment.lastRecordTime < experiment.recordInterval) {
        return;
      }

      experiment.lastRecordTime = t;

      experiment.rows.push({
        time: t.toFixed(3),
        jaw: jaw.toFixed(3),
        smile: smile.toFixed(3),
        pucker: pucker.toFixed(3),
        recognizedMouth: currentMouthState,
        lane: playerLane
      });

      if (experiment.rows.length % 30 === 0) {
        updateExperimentStatus();
      }
    }

    async function sendExperimentToSheet() {
      if (experiment.isRecording) {
        alert("記録中です。先に停止してください。");
        return;
      }

      if (experiment.rows.length === 0) {
        alert("送信するデータがありません。");
        return;
      }

      experiment.participantId = participantInput.value.trim() || "P01";
      updateExperimentStatus("Google Sheetsへ送信中...");

      const payload = {
        participant: experiment.participantId,
        targetMouth: experiment.targetMouth,
        rows: experiment.rows
      };

      try {
        // Apps Script WebアプリはCORS応答を返せない場合があるため no-cors で送信する。
        // no-corsでは返答内容は読めないが、送信自体は行われる。
        await fetch(GAS_URL, {
          method: "POST",
          mode: "no-cors",
          body: JSON.stringify(payload)
        });

        updateExperimentStatus("送信完了。Google Sheets側を確認してください。");
        alert("送信しました。Google Sheetsを確認してください。");
      } catch (error) {
        console.error(error);
        updateExperimentStatus("送信失敗");
        alert("送信に失敗しました。通信環境とGAS URLを確認してください。");
      }
    }


    // ==================================================
    // Mouth Detection
    // ==================================================
    function updateMouthState(dt) {
      const beCondition =
        jaw > settings.beJawThreshold &&
        smile > settings.beSmileThreshold &&
        pucker < settings.bePuckerBlockThreshold &&
        jaw > smile * 0.85;

      if (beCondition) {
        beTimer += dt;
      } else {
        beTimer = 0;
      }

      const max = Math.max(jaw, smile, pucker);

      if (beTimer >= settings.beHoldTime) {
        setPlayerLane(3, "BE");
        return;
      }

      if (max < settings.mouthDeadZone) {
        currentMouthState = "";
        return;
      }

      if (jaw >= smile && jaw >= pucker) {
        setPlayerLane(0, "A");
      } else if (smile >= jaw && smile >= pucker) {
        setPlayerLane(1, "I");
      } else {
        setPlayerLane(2, "U");
      }
    }

    // ==================================================
    // Spawn
    // ==================================================
    function spawnObstacleSet() {
      const safeLane = getSafeLane();

      const blockCount =
        settings.blockMode === "BlockThreeLanes" ? 3 : 2;

      const candidates = [];

      for (let i = 0; i < 4; i++) {
        if (i !== safeLane) candidates.push(i);
      }

      // shuffle
      for (let i = candidates.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
      }

      const blockedLanes = candidates.slice(0, blockCount);

      obstacleSets.push({
        y: -120,
        safeLane,
        blockedLanes,
        judged: false,
        hit: false
      });

      for (let i = 0; i < settings.coinCountPerSet; i++) {
        coins.push({
          lane: safeLane,
          y: -260 - i * 45,
          collected: false
        });
      }
    }

    // ==================================================
    // Update Game
    // ==================================================
    function updateGame(dt) {
      if (gameState !== "playing") return;

      elapsed += dt;
      spawnTimer += dt;

      if (spawnedCount < settings.totalSets &&
          spawnTimer >= settings.spawnInterval) {
        spawnTimer = 0;
        spawnObstacleSet();
        spawnedCount++;
      }

      updateMouthState(dt);

      playerX +=
        (targetPlayerX - playerX) *
        Math.min(1, dt * settings.playerMoveSpeed);

      const playerY = getPlayerY();

      // obstacles
      for (const set of obstacleSets) {
        set.y += settings.obstacleSpeed * dt;

        if (!set.judged) {
          for (const lane of set.blockedLanes) {
            const ox = getLaneX(lane);
            const oy = set.y;

            const hit =
              Math.abs(playerX - ox) < 40 &&
              Math.abs(playerY - oy) < 45;

            if (hit) {
              set.hit = true;
              set.judged = true;
              hitCount++;
              judgedCount++;
              break;
            }
          }

          if (!set.judged && set.y > playerY + 70) {
            set.judged = true;
            successCount++;
            judgedCount++;
          }
        }
      }

      // coins
      for (const coin of coins) {
        coin.y += settings.obstacleSpeed * dt;

        if (!coin.collected) {
          const cx = getLaneX(coin.lane);
          const cy = coin.y;

          const hit =
            Math.abs(playerX - cx) < 45 &&
            Math.abs(playerY - cy) < 45;

          if (hit) {
            coin.collected = true;
            coinCount++;
          }
        }
      }

      if (judgedCount >= settings.totalSets) {
        gameState = "result";
      }
    }

    // ==================================================
    // Draw
    // ==================================================
    function drawGame() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawLanes();
      drawObjects();
      drawPlayer();
      drawUI();

      if (gameState === "result") {
        drawResult();
      }
    }

    function drawLanes() {
      const h = canvas.height;
      const top = 0;
      const bottom = h;

      for (let i = 0; i < 4; i++) {
        const x = getLaneX(i);
        const laneW = canvas.width * (isPortrait() ? 0.20 : 0.18);

        ctx.fillStyle = laneColors[i];
        ctx.globalAlpha = 0.25;
        ctx.fillRect(x - laneW / 2, top, laneW, bottom);
        ctx.globalAlpha = 1;

        ctx.strokeStyle = laneColors[i];
        ctx.lineWidth = 4;
        ctx.strokeRect(x - laneW / 2, top, laneW, bottom);

        ctx.fillStyle = "white";
        ctx.strokeStyle = "black";
        ctx.lineWidth = 5;
        ctx.font = "bold 36px sans-serif";
        ctx.textAlign = "center";
        ctx.strokeText(laneLabels[i], x, h - 35);
        ctx.fillText(laneLabels[i], x, h - 35);
      }
    }

    function drawObjects() {
      // obstacles
      for (const set of obstacleSets) {
        if (set.y > canvas.height + 100) continue;

        for (const lane of set.blockedLanes) {
          const x = getLaneX(lane);

          ctx.fillStyle = "#222";
          ctx.strokeStyle = "white";
          ctx.lineWidth = 3;

          ctx.fillRect(x - 35, set.y - 35, 70, 70);
          ctx.strokeRect(x - 35, set.y - 35, 70, 70);
        }
      }

      // coins
      for (const coin of coins) {
        if (coin.collected) continue;
        if (coin.y > canvas.height + 50) continue;

        const x = getLaneX(coin.lane);

        ctx.fillStyle = "#FFD700";
        ctx.strokeStyle = "black";
        ctx.lineWidth = 3;

        ctx.beginPath();
        ctx.arc(x, coin.y, 16, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      }
    }

    function drawPlayer() {
      const y = getPlayerY();

      ctx.fillStyle = "#ffffff";
      ctx.strokeStyle = "black";
      ctx.lineWidth = 4;

      ctx.beginPath();
      ctx.arc(playerX, y, 28, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = "black";
      ctx.font = "bold 22px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(currentMouthState, playerX, y + 8);
    }

    function drawUI() {
      ctx.textAlign = "right";
      ctx.font = isPortrait() ? "bold 18px sans-serif" : "bold 24px sans-serif";
      ctx.fillStyle = "white";
      ctx.strokeStyle = "black";
      ctx.lineWidth = 4;

      const x = canvas.width - 12;
      let y = isPortrait() ? 92 : 40;

      const lines = [
        `Avoid : ${successCount}/${settings.totalSets}`,
        `Hit : ${hitCount}`,
        `Coins : ${coinCount}`,
        `Mouth : ${currentMouthState}`
      ];

      for (const line of lines) {
        ctx.strokeText(line, x, y);
        ctx.fillText(line, x, y);
        y += isPortrait() ? 26 : 34;
      }
    }

    function drawResult() {
      ctx.fillStyle = "rgba(0,0,0,0.75)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.textAlign = "center";
      ctx.fillStyle = "white";
      ctx.strokeStyle = "black";
      ctx.lineWidth = 5;

      ctx.font = "bold 42px sans-serif";
      ctx.strokeText("RESULT", canvas.width / 2, canvas.height / 2 - 100);
      ctx.fillText("RESULT", canvas.width / 2, canvas.height / 2 - 100);

      ctx.font = "bold 28px sans-serif";

      const lines = [
        `Score : ${successCount}/${settings.totalSets}`,
        `Hit : ${hitCount}`,
        `Coins : ${coinCount}`
      ];

      let y = canvas.height / 2 - 30;

      for (const line of lines) {
        ctx.strokeText(line, canvas.width / 2, y);
        ctx.fillText(line, canvas.width / 2, y);
        y += 45;
      }
    }

    // ==================================================
    // Main Loop
    // ==================================================
    function mainLoop(now) {
      const dt = Math.min(0.05, (now - lastTime) / 1000);
      lastTime = now;

      updateMouthValues();
      updateGame(dt);
      recordExperimentRow();
      drawGame();

      requestAnimationFrame(mainLoop);
    }

    function showError(error) {
      console.error(error);
      drawGame();
      debugText.style.display = "block";
      debugText.innerText =
        "Error:\n" +
        (error && error.message ? error.message : String(error)) +
        "\n\nスマホのカメラは HTTPS か localhost でないと起動できないことがあります。";
    }


    // type="module" 内の関数をHTMLボタンから呼べるようにする
    window.startExperiment = startExperiment;
    window.stopExperiment = stopExperiment;
    window.sendExperimentToSheet = sendExperimentToSheet;
    window.clearExperimentRows = clearExperimentRows;


    // ==================================================
    // Start
    // ==================================================
    window.addEventListener("load", async () => {
      playerX = getLaneX(0);
      targetPlayerX = playerX;
      updateExperimentStatus();

      try {
        await initMediaPipe();
        await initCamera();
      } catch (error) {
        showError(error);
      }
    });
  </script>
</body>
</html>
